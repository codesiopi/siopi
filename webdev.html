<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Development</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#c9e1ec;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI",
  Roboto, Helvetica, Arial, sans-serif;
}

/* wrapper */
.wrapper{
  padding:40px;
}

/* card */
.card{
  width:100%;
  background:#ffffff;
  padding:30px;
  border:2px dotted orange;
  border-radius:6px;
}

/* judul */
.card h3{
  margin:0 0 6px;
  font-size:18px;
  font-weight:800;
  color:#000;
}

/* deskripsi */
.card p{
  margin:0;
  font-size:14px;
  color:#000;
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="card">
    <h3>💻 Web Development</h3>
    <p>Jalur untuk membantu website profesional</p>
  </div>

</div>

</body>
  </html>
