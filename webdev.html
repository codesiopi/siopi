<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Development</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI",

}

/* card full width */
.card{
  width:100%;
  height:120px; /* tinggi tetap */
  background:#ffffff;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* teks */
.card h3{
  margin:0 0 6px;
  font-size:18px;
  font-weight:800;
  color:#000;
}

.card p{
  margin:0;
  font-size:14px;
  color:#000;
}

</style>
</head>

<body>

<div class="card">
  <h3>💻 Web Development</h3>
  <p>Jalur untuk membangun website profesional dan skill web dari dasar.</p>
</div>

</html>
